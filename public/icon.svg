<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" stop-opacity="0.25"/>
      <stop offset="100%" style="stop-color:#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="160" cy="380" rx="120" ry="80" fill="#6366f1" opacity="0.07"/>
  <ellipse cx="370" cy="160" rx="100" ry="70" fill="#10b981" opacity="0.1"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" clip-path="url(#roundedClip)">
    <line x1="0" y1="180" x2="512" y2="180"/>
    <line x1="0" y1="260" x2="512" y2="260"/>
    <line x1="0" y1="340" x2="512" y2="340"/>
    <line x1="160" y1="100" x2="160" y2="440"/>
    <line x1="280" y1="100" x2="280" y2="440"/>
    <line x1="400" y1="100" x2="400" y2="440"/>
  </g>

  <!-- Chart area fill -->
  <path d="M80,340 C120,320 150,335 200,300 C240,270 270,230 310,195 C350,162 390,148 432,120 L432,400 L80,400 Z"
        fill="url(#fillGrad)" clip-path="url(#roundedClip)"/>

  <!-- Chart line (smooth curve) -->
  <path d="M80,340 C120,320 150,335 200,300 C240,270 270,230 310,195 C350,162 390,148 432,120"
        fill="none"
        stroke="url(#chartGrad)"
        stroke-width="14"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Glowing endpoint dot -->
  <circle cx="432" cy="120" r="22" fill="#10b981" opacity="0.2" filter="url(#softglow)"/>
  <circle cx="432" cy="120" r="14" fill="#0d0d1a" stroke="#34d399" stroke-width="4"/>
  <circle cx="432" cy="120" r="5" fill="#34d399"/>

  <!-- Small coin / dollar node (bottom left area) -->
  <circle cx="128" cy="390" r="36" fill="url(#coinGrad)" filter="url(#glow)" opacity="0.9"/>
  <text x="128" y="403" font-family="Georgia, serif" font-size="34" font-weight="900"
        fill="#1a1a1a" text-anchor="middle">$</text>

  <!-- AI spark nodes along the curve -->
  <circle cx="200" cy="300" r="6" fill="#6366f1" opacity="0.9" filter="url(#glow)"/>
  <circle cx="310" cy="195" r="6" fill="#818cf8" opacity="0.9" filter="url(#glow)"/>

  <!-- Subtle "AB" monogram watermark bottom right -->
  <text x="404" y="408" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="800" fill="#ffffff" opacity="0.08"
        text-anchor="middle">AB</text>
</svg>
