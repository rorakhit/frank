<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0ff00"/>
      <stop offset="100%" style="stop-color:#00ffb2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" rx="108" fill="#080808"/>

  <!-- Ghost body — bold rounded silhouette -->
  <path d="M256,72 C176,72 128,132 128,200 L128,380
           C128,380 156,356 184,380 C212,404 228,380 256,380
           C284,380 300,404 328,380 C356,356 384,380 384,380
           L384,200 C384,132 336,72 256,72 Z"
        fill="url(#neon)" filter="url(#softglow)" opacity="0.15"/>
  <path d="M256,72 C176,72 128,132 128,200 L128,380
           C128,380 156,356 184,380 C212,404 228,380 256,380
           C284,380 300,404 328,380 C356,356 384,380 384,380
           L384,200 C384,132 336,72 256,72 Z"
        fill="none" stroke="url(#neon)" stroke-width="14"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Eyes — two bold dots -->
  <circle cx="214" cy="210" r="22" fill="url(#neon)" filter="url(#glow)"/>
  <circle cx="298" cy="210" r="22" fill="url(#neon)" filter="url(#glow)"/>

  <!-- Dollar sign — punchy, centered below eyes -->
  <text x="256" y="328"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="88" font-weight="900"
        fill="url(#neon)" text-anchor="middle"
        filter="url(#glow)">$</text>
</svg>
