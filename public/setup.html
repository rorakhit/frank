<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml">
  <title>AutoBudget — Setup</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 32px; }
    label { display: block; margin: 12px 0 4px; font-weight: 500; }
    input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    .card-row { border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; margin: 12px 0; }
    button { background: #1a1a1a; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 24px; }
    #status { margin-top: 16px; color: #666; }
  </style>
</head>
<body>
  <h1>AutoBudget — Setup</h1>
  <form method="POST" action="" id="setup-form">
    <h2>Credit Card APRs &amp; Limits</h2>
    <div id="cards"></div>

    <h2>Savings Goal</h2>
    <label>Goal type
      <select name="target_type">
        <option value="fixed">Fixed amount per paycheck</option>
        <option value="percentage">Percentage of paycheck</option>
      </select>
    </label>
    <label>Amount ($ or %)
      <input type="number" name="target_value" step="0.01" min="0" placeholder="e.g. 200 or 10">
    </label>

    <button type="submit">Save Setup</button>
    <div id="status"></div>
  </form>

  <script>
    const accounts = __ACCOUNTS_JSON__
    const cards = document.getElementById('cards')

    if (accounts.length === 0) {
      cards.innerHTML = '<p>No credit accounts found. Connect accounts first via /link.</p>'
    } else {
      accounts.forEach(acct => {
        cards.innerHTML += `
          <div class="card-row">
            <strong>${acct.name}${acct.mask ? ` ····${acct.mask}` : ''}</strong>
            <label>APR (%)
              <input type="number" name="apr_${acct.id}" step="0.01" min="0" max="100" placeholder="e.g. 24.99" value="${acct.apr ?? ''}" required>
            </label>
            <label>Credit Limit ($)
              <input type="number" name="limit_${acct.id}" step="0.01" min="0" placeholder="e.g. 5000" value="${acct.credit_limit ?? ''}" required>
            </label>
          </div>`
      })
    }

    document.getElementById('setup-form').addEventListener('submit', async e => {
      e.preventDefault()
      const status = document.getElementById('status')
      const data = new URLSearchParams(new FormData(e.target))
      const res = await fetch(`/setup`, { method: 'POST', body: data })
      const json = await res.json()
      status.textContent = res.ok ? '✅ Setup saved!' : `❌ ${json.error}`
    })
  </script>
</body>
</html>
