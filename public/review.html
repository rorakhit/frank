<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml">
  <title>AutoBudget — Review Categories</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #111; }
    .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.78rem; color: #6b7280; text-decoration: none; margin-bottom: 20px; }
    .back-link:hover { color: #111; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .filters { display: flex; gap: 16px; margin-bottom: 20px; align-items: center; }
    .filters input[type="text"] { padding: 7px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; width: 240px; }
    .filters label { font-size: 0.9rem; color: #444; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #eee; color: #666; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr.merchant-row:hover > td { background: #fafafa; }
    .confidence { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
    .conf-high { background: #d1fae5; color: #065f46; }
    .conf-mid  { background: #fef3c7; color: #92400e; }
    .conf-low  { background: #fee2e2; color: #991b1b; }
    .sample { color: #888; font-size: 0.8rem; margin-top: 3px; }
    .sample-row { display: flex; gap: 8px; }
    .sample-date { color: #aaa; min-width: 80px; }
    .sample-amount { color: #555; min-width: 60px; }
    .sample-name { color: #888; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    select { padding: 5px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.85rem; background: white; }
    select.changed { border-color: #6366f1; background: #eef2ff; }
    button.save { padding: 5px 14px; background: #6366f1; color: white; border: none; border-radius: 5px; font-size: 0.85rem; cursor: pointer; display: none; }
    button.save:hover { background: #4f46e5; }
    button.save.visible { display: inline-block; }
    button.saved { background: #10b981; }
    button.confirm-merchant { padding: 5px 12px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 5px; font-size: 0.85rem; cursor: pointer; }
    button.confirm-merchant:hover { background: #dcfce7; }
    #save-all { padding: 9px 20px; background: #1a1a1a; color: white; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
    #save-all:disabled { opacity: 0.4; cursor: default; }
    #save-all:hover:not(:disabled) { background: #333; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    #pending-count { font-size: 0.85rem; color: #6366f1; font-weight: 600; }
    #status { font-size: 0.85rem; color: #666; margin-top: 12px; min-height: 20px; }
    .empty { text-align: center; padding: 60px 0; color: #999; }

    /* Expand button */
    .expand-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: #6366f1; padding: 0; white-space: nowrap; }
    .expand-btn:hover { text-decoration: underline; }

    /* Transaction sub-rows */
    tr.tx-row td { background: #f8f8ff; padding: 6px 12px 6px 28px; border-bottom: 1px solid #ececff; font-size: 0.85rem; }
    tr.tx-row:last-of-type td { border-bottom: 2px solid #eee; }
    tr.tx-row td.tx-meta { color: #777; }
    .tx-rawname { font-style: italic; color: #999; font-size: 0.8rem; }
    .tx-actions { display: flex; align-items: center; gap: 8px; }
    button.tx-save { padding: 4px 12px; background: #6366f1; color: white; border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
    button.tx-save:disabled { opacity: 0.5; cursor: default; }
    button.tx-save:hover:not(:disabled) { background: #4f46e5; }
    button.tx-confirm { padding: 4px 10px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
    button.tx-confirm:hover { background: #dcfce7; }
    .tx-saved-label { font-size: 0.8rem; color: #10b981; font-weight: 600; }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Home</a>
  <h1>AutoBudget — Review Categories</h1>
  <p class="subtitle">Merchants sorted by lowest confidence first. Correct a whole merchant or expand to fix individual transactions.</p>

  <div class="filters">
    <input id="search" type="text" placeholder="Search merchant…">
    <label><input id="flagged-only" type="checkbox" checked> Flagged only (confidence &lt; 80)</label>
  </div>

  <div class="toolbar">
    <span id="pending-count"></span>
    <button id="save-all" disabled>Save all changes</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Merchant</th>
        <th>Txns</th>
        <th>Avg</th>
        <th>Confidence</th>
        <th>Category</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="status"></div>

  <script>
    const tbody = document.getElementById('tbody')
    const searchInput = document.getElementById('search')
    const flaggedOnly = document.getElementById('flagged-only')
    const saveAllBtn = document.getElementById('save-all')
    const pendingCount = document.getElementById('pending-count')
    const statusEl = document.getElementById('status')

    let allMerchants = []
    let categories = []
    const changes = new Map()       // merchant -> new category
    const expandedMerchants = new Set()

    function confClass(c) {
      if (c >= 80) return 'conf-high'
      if (c >= 50) return 'conf-mid'
      return 'conf-low'
    }

    function categoryOpts(selected) {
      return categories.map(c => `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`).join('')
    }

    function merchantKey(name) { return name.replace(/"/g, '&quot;') }

    function render() {
      const q = searchInput.value.toLowerCase()
      const onlyFlagged = flaggedOnly.checked

      const filtered = allMerchants.filter(m => {
        if (onlyFlagged && m.minConfidence >= 80 && !changes.has(m.merchant)) return false
        if (q && !m.merchant.toLowerCase().includes(q)) return false
        return true
      })

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No merchants to review.</td></tr>'
        return
      }

      const rows = []
      for (const m of filtered) {
        const currentCat = changes.get(m.merchant) ?? m.category
        const avg = (m.totalAmount / m.count).toFixed(2)
        const isChanged = changes.has(m.merchant)
        const isExpanded = expandedMerchants.has(m.merchant)
        const sampleHtml = m.sample.map(s =>
          `<div class="sample-row">
            <span class="sample-date">${s.date}</span>
            <span class="sample-amount">$${Number(s.amount).toFixed(2)}</span>
            <span class="sample-name" title="${s.rawName}">${s.rawName}</span>
          </div>`
        ).join('')

        rows.push(`<tr class="merchant-row" data-merchant="${merchantKey(m.merchant)}">
          <td>
            <strong>${m.merchant}</strong>
            <div class="sample">${sampleHtml}</div>
            <button class="expand-btn" data-merchant="${merchantKey(m.merchant)}">
              ${isExpanded ? '▾ hide transactions' : '▸ edit individual transactions'}
            </button>
          </td>
          <td>${m.count}</td>
          <td>$${avg}</td>
          <td><span class="confidence ${confClass(m.minConfidence)}">${m.minConfidence}%</span></td>
          <td><select class="cat-select ${isChanged ? 'changed' : ''}" data-original="${m.category}">${categoryOpts(currentCat)}</select></td>
          <td style="white-space:nowrap">
            <button class="save ${isChanged ? 'visible' : ''}" data-merchant="${merchantKey(m.merchant)}">Save all</button>
            ${m.minConfidence < 80 ? `<button class="confirm-merchant" data-merchant="${merchantKey(m.merchant)}" title="Mark all as correctly categorized">✓ Confirm all</button>` : ''}
          </td>
        </tr>`)

        if (isExpanded) {
          const txs = m._transactions
          if (!txs) {
            rows.push(`<tr class="tx-row"><td colspan="6" style="text-align:center;color:#aaa">Loading…</td></tr>`)
          } else if (!txs.length) {
            rows.push(`<tr class="tx-row"><td colspan="6" style="text-align:center;color:#aaa">No transactions found.</td></tr>`)
          } else {
            for (const tx of txs) {
              rows.push(`<tr class="tx-row" data-tx-id="${tx.id}">
                <td colspan="3">
                  <span class="sample-date">${tx.date}</span>
                  <strong style="margin:0 8px">$${tx.amount.toFixed(2)}</strong>
                  <span class="tx-rawname">${tx.rawName}</span>
                </td>
                <td><span class="confidence ${confClass(tx.confidence)}">${tx.confidence}%</span></td>
                <td><select class="tx-cat-select" data-original="${tx.category}">${categoryOpts(tx.category)}</select></td>
                <td>
                  <div class="tx-actions">
                    <button class="tx-save" data-tx-id="${tx.id}" style="display:none">Save</button>
                    ${tx.confidence < 80 ? `<button class="tx-confirm" data-tx-id="${tx.id}">✓ Confirm</button>` : ''}
                  </div>
                </td>
              </tr>`)
            }
          }
        }
      }

      tbody.innerHTML = rows.join('')
      updatePending()
    }

    function updatePending() {
      const n = changes.size
      pendingCount.textContent = n ? `${n} unsaved change${n > 1 ? 's' : ''}` : ''
      saveAllBtn.disabled = n === 0
    }

    // Merchant-level category change
    tbody.addEventListener('change', e => {
      if (e.target.classList.contains('cat-select')) {
        const row = e.target.closest('tr')
        const merchant = row.dataset.merchant
        const original = e.target.dataset.original
        if (e.target.value === original) {
          changes.delete(merchant)
          e.target.classList.remove('changed')
          row.querySelector('.save').classList.remove('visible')
        } else {
          changes.set(merchant, e.target.value)
          e.target.classList.add('changed')
          row.querySelector('.save').classList.add('visible')
        }
        updatePending()
      }

      // Per-transaction category change
      if (e.target.classList.contains('tx-cat-select')) {
        const row = e.target.closest('tr')
        const saveBtn = row.querySelector('.tx-save')
        saveBtn.style.display = e.target.value !== e.target.dataset.original ? 'inline-block' : 'none'
      }
    })

    // Expand/collapse
    tbody.addEventListener('click', async e => {
      if (e.target.classList.contains('expand-btn')) {
        const merchant = e.target.dataset.merchant
        if (expandedMerchants.has(merchant)) {
          expandedMerchants.delete(merchant)
          render()
          return
        }
        expandedMerchants.add(merchant)
        const m = allMerchants.find(x => x.merchant === merchant)
        render()
        // Fetch transactions
        const res = await fetch(`/review/merchant/${encodeURIComponent(merchant)}`)
        const data = await res.json()
        if (m) m._transactions = data.transactions
        render()
        return
      }

      // Merchant-level save
      if (e.target.classList.contains('save')) {
        const merchant = e.target.dataset.merchant
        const category = changes.get(merchant)
        if (!category) return
        e.target.disabled = true
        try {
          await fetch(`/review/correct`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ merchant_name: merchant, category }),
          }).then(r => { if (!r.ok) throw new Error() })
          changes.delete(merchant)
          const m = allMerchants.find(x => x.merchant === merchant)
          if (m) {
            m.category = category
            m.minConfidence = 100
            if (m._transactions) m._transactions.forEach(tx => { tx.category = category; tx.confidence = 100 })
          }
          e.target.classList.add('saved')
          setTimeout(() => render(), 500)
        } catch {
          statusEl.textContent = `❌ Failed to save ${merchant}`
          e.target.disabled = false
        }
        updatePending()
        return
      }

      // Merchant-level confirm
      if (e.target.classList.contains('confirm-merchant')) {
        const merchant = e.target.dataset.merchant
        e.target.disabled = true
        try {
          await fetch(`/review/confirm-merchant`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ merchant_name: merchant }),
          }).then(r => { if (!r.ok) throw new Error() })
          const m = allMerchants.find(x => x.merchant === merchant)
          if (m) {
            m.minConfidence = 100
            if (m._transactions) m._transactions.forEach(tx => { tx.confidence = 100 })
          }
          setTimeout(() => render(), 400)
        } catch { statusEl.textContent = `❌ Failed to confirm ${merchant}`; e.target.disabled = false }
        return
      }

      // Per-transaction confirm
      if (e.target.classList.contains('tx-confirm')) {
        const txId = e.target.dataset.txId
        e.target.disabled = true
        try {
          await fetch(`/review/confirm-transaction`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plaid_transaction_id: txId }),
          }).then(r => { if (!r.ok) throw new Error() })
          for (const m of allMerchants) {
            const tx = (m._transactions ?? []).find(t => t.id === txId)
            if (tx) tx.confidence = 100
          }
          const actions = e.target.closest('.tx-actions')
          e.target.replaceWith(Object.assign(document.createElement('span'), { className: 'tx-saved-label', textContent: '✓ confirmed' }))
          setTimeout(() => actions.querySelector('.tx-saved-label')?.remove(), 2000)
        } catch { statusEl.textContent = `❌ Failed to confirm transaction`; e.target.disabled = false }
        return
      }

      // Per-transaction save
      if (e.target.classList.contains('tx-save')) {
        const txId = e.target.dataset.txId
        const row = e.target.closest('tr')
        const select = row.querySelector('.tx-cat-select')
        const category = select.value
        e.target.disabled = true
        try {
          await fetch(`/review/correct-transaction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plaid_transaction_id: txId, category }),
          }).then(r => { if (!r.ok) throw new Error() })
          select.dataset.original = category
          e.target.style.display = 'none'
          // Update local cache
          for (const m of allMerchants) {
            const tx = (m._transactions ?? []).find(t => t.id === txId)
            if (tx) { tx.category = category; tx.confidence = 100 }
          }
          const actions = e.target.closest('.tx-actions')
          const saved = document.createElement('span')
          saved.className = 'tx-saved-label'
          saved.textContent = '✓ saved'
          actions.appendChild(saved)
          setTimeout(() => saved.remove(), 2000)
        } catch {
          statusEl.textContent = `❌ Failed to save transaction`
          e.target.disabled = false
        }
      }
    })

    saveAllBtn.addEventListener('click', async () => {
      saveAllBtn.disabled = true
      let saved = 0, failed = 0
      for (const [merchant, category] of [...changes.entries()]) {
        try {
          await fetch(`/review/correct`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ merchant_name: merchant, category }),
          }).then(r => { if (!r.ok) throw new Error() })
          changes.delete(merchant)
          const m = allMerchants.find(x => x.merchant === merchant)
          if (m) { m.category = category; m.minConfidence = 100 }
          saved++
        } catch { failed++ }
      }
      statusEl.textContent = `✅ Saved ${saved}${failed ? ` — ❌ ${failed} failed` : ''}`
      render()
    })

    searchInput.addEventListener('input', render)
    flaggedOnly.addEventListener('change', render)

    fetch(`/review/transactions`)
      .then(r => r.json())
      .then(data => {
        allMerchants = data.merchants
        categories = data.categories
        render()
      })
      .catch(() => { statusEl.textContent = '❌ Failed to load transactions.' })
  </script>
</body>
</html>
