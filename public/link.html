<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml">
  <title>AutoBudget — Connect Accounts</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.78rem; color: #6b7280; text-decoration: none; margin-bottom: 20px; }
    .back-link:hover { color: #111; }
    h1 { font-size: 1.4rem; }
    button { background: #1a1a1a; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 16px; color: #666; }
    #connected { margin-top: 16px; }
    #connected li { margin: 4px 0; color: #333; }
    .institution { margin-top: 20px; }
    .institution strong { display: block; margin-bottom: 4px; }
    .institution ul { margin: 0; padding-left: 20px; }
    .institution li { color: #555; font-size: 0.9rem; margin: 2px 0; }
    h2 { font-size: 1.1rem; margin-top: 40px; border-top: 1px solid #eee; padding-top: 16px; }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Home</a>
  <h1>AutoBudget — Connect Bank Accounts</h1>
  <p>Click below to connect your bank accounts, credit cards, and payment apps.</p>
  <button id="launch">Connect Account</button>
  <div id="status"></div>
  <ul id="connected"></ul>
  <div id="existing"></div>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    const status = document.getElementById('status')
    const btn = document.getElementById('launch')
    const connectedList = document.getElementById('connected')
    const existingDiv = document.getElementById('existing')

    fetch(`/link/accounts`)
      .then(r => r.json())
      .then(items => {
        if (!items.length) return
        existingDiv.innerHTML = '<h2>Already linked</h2>'
        items.forEach(item => {
          const div = document.createElement('div')
          div.className = 'institution'
          div.innerHTML = `<strong>${item.institution_name}</strong><ul>${
            (item.accounts ?? []).map(a =>
              `<li>${a.name} (${a.subtype ?? a.type}${a.mask ? ' ···' + a.mask : ''})</li>`
            ).join('')
          }</ul>`
          existingDiv.appendChild(div)
        })
      })
      .catch(() => {})

    async function openLink() {
      btn.disabled = true
      status.textContent = 'Loading…'

      let linkToken
      try {
        const res = await fetch(`/link/token`)
        if (!res.ok) throw new Error('Failed to get link token')
        linkToken = (await res.json()).link_token
      } catch {
        status.textContent = '❌ Could not start Plaid Link.'
        btn.disabled = false
        return
      }

      localStorage.setItem('plaid_link_token', linkToken)
      status.textContent = ''

      const handler = Plaid.create({
        token: linkToken,
        onSuccess(publicToken, metadata) {
          status.textContent = `Connecting ${metadata.institution.name}…`
          fetch(`/link/exchange`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              public_token: publicToken,
              institution_id: metadata.institution.institution_id,
              institution_name: metadata.institution.name,
              accounts: metadata.accounts,
            }),
          })
            .then(r => r.json())
            .then(d => {
              const li = document.createElement('li')
              li.textContent = `✅ ${d.institution} (${d.accounts} accounts) — syncing in background`
              connectedList.appendChild(li)
              status.textContent = ''
              btn.textContent = 'Connect Another Account'
              btn.disabled = false
            })
            .catch(() => {
              status.textContent = '❌ Error connecting account.'
              btn.disabled = false
            })
        },
        onExit(err) {
          if (err) status.textContent = `Error: ${err.display_message ?? err.error_message}`
          btn.disabled = false
        },
      })

      handler.open()
    }

    btn.addEventListener('click', openLink)
  </script>
</body>
</html>
