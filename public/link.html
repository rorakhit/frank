<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml">
  <title>Connect Banks — AutoBudget</title>
  <script src="/public/nav.js"></script>
  <style>
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    button.primary { background: #1a1a1a; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button.primary:disabled { opacity: 0.5; cursor: default; }
    button.primary:hover:not(:disabled) { background: #333; }
    #status { margin-top: 16px; color: #666; font-size: 0.9rem; }
    #connected { margin-top: 16px; list-style: none; padding: 0; }
    #connected li { margin: 4px 0; color: #333; font-size: 0.9rem; }
    .institution { margin-top: 20px; }
    .institution strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
    .institution ul { margin: 0; padding-left: 20px; }
    .institution li { color: #555; font-size: 0.88rem; margin: 2px 0; }
    h2 { font-size: 1rem; font-weight: 600; margin-top: 40px; border-top: 1px solid #eee; padding-top: 16px; }
    @media print { #ab-sidebar, .ab-topbar { display: none !important; } main { margin-left: 0 !important; } }
  </style>
</head>
<body>
  <main>
    <div class="page-body">
      <div class="page-head">
        <h1>Connect Banks</h1>
      </div>
      <p class="subtitle">Connect your bank accounts, credit cards, and payment apps via Plaid.</p>
      <button class="primary" id="launch">Connect Account</button>
      <div id="status"></div>
      <ul id="connected"></ul>
      <div id="existing"></div>
    </div>
  </main>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    const status = document.getElementById('status')
    const btn = document.getElementById('launch')
    const connectedList = document.getElementById('connected')
    const existingDiv = document.getElementById('existing')

    fetch(`/link/accounts`).then(r => r.json()).then(items => {
      if (!items.length) return
      existingDiv.innerHTML = '<h2>Already linked</h2>'
      items.forEach(item => {
        const div = document.createElement('div')
        div.className = 'institution'
        div.innerHTML = `<strong>${item.institution_name}</strong><ul>${(item.accounts ?? []).map(a => `<li>${a.name} (${a.subtype ?? a.type}${a.mask ? ' ···' + a.mask : ''})</li>`).join('')}</ul>`
        existingDiv.appendChild(div)
      })
    }).catch(() => {})

    async function openLink() {
      btn.disabled = true; status.textContent = 'Loading…'
      let linkToken
      try {
        const res = await fetch(`/link/token`)
        if (!res.ok) throw new Error('Failed to get link token')
        linkToken = (await res.json()).link_token
      } catch { status.textContent = '❌ Could not start Plaid Link.'; btn.disabled = false; return }
      localStorage.setItem('plaid_link_token', linkToken)
      status.textContent = ''
      const handler = Plaid.create({
        token: linkToken,
        onSuccess(publicToken, metadata) {
          status.textContent = `Connecting ${metadata.institution.name}…`
          fetch(`/link/exchange`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ public_token: publicToken, institution_id: metadata.institution.institution_id, institution_name: metadata.institution.name, accounts: metadata.accounts }) })
            .then(r => r.json())
            .then(d => { const li = document.createElement('li'); li.textContent = `✅ ${d.institution} (${d.accounts} accounts) — syncing in background`; connectedList.appendChild(li); status.textContent = ''; btn.textContent = 'Connect Another Account'; btn.disabled = false })
            .catch(() => { status.textContent = '❌ Error connecting account.'; btn.disabled = false })
        },
        onExit(err) { if (err) status.textContent = `Error: ${err.display_message ?? err.error_message}`; btn.disabled = false },
      })
      handler.open()
    }

    btn.addEventListener('click', openLink)
  </script>
</body>
</html>
