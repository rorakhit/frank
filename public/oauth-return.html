<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/public/icon.svg" type="image/svg+xml">
  <title>AutoBudget — Connecting…</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    #status { margin-top: 16px; color: #666; }
  </style>
</head>
<body>
  <h1>AutoBudget — Finishing Connection</h1>
  <div id="status">Completing bank authentication…</div>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    const token = localStorage.getItem('plaid_link_token')
    const status = document.getElementById('status')

    if (!token) {
      status.textContent = '❌ Session expired. Please start over.'
    } else {
      const handler = Plaid.create({
        token,
        receivedRedirectUri: window.location.href,
        onSuccess(publicToken, metadata) {
          status.textContent = `Connecting ${metadata.institution.name}…`
          fetch(`/link/exchange`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              public_token: publicToken,
              institution_id: metadata.institution.institution_id,
              institution_name: metadata.institution.name,
              accounts: metadata.accounts,
            }),
          })
            .then(r => r.json())
            .then(d => {
              localStorage.removeItem('plaid_link_token')
              status.textContent = `✅ Connected ${d.institution} (${d.accounts} accounts). Syncing transactions in background…`
            })
            .catch(() => { status.textContent = '❌ Error connecting account.' })
        },
        onExit(err) {
          if (err) status.textContent = `Error: ${err.display_message ?? err.error_message}`
          else status.textContent = 'Connection cancelled.'
        },
      })
      handler.open()
    }
  </script>
</body>
</html>
